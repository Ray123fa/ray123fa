<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
  <title>Hai Cantik🤗</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style type="text/css">
    @import url("https://fonts.googleapis.com/css2?family=KoHo&display=swap");
    * {
      margin: 0;
      padding: 0;
      font-family: 'KoHo', sans-serif;
    }
    body {
      width: 100%;
      height: 100vh;
      background: #546ced;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    h2 {
      color: black;
    }
  </style>
</head>
<body>
  <script>
    const {
      value: text
    } = Swal.fire({
        html: '<h2>Hai cewe</h2>',
        input: 'text',
        inputPlaceholder: 'Ketik nama panggilannya dulu atuh...',
        showCancelButton: true,
        inputValidator: (value) => {
          if (!value) {
            return 'Harap ketik sesuatu!'
          }
        }
      })
    .then((result) => {
      if (result.isConfirmed) {
        Swal.fire({
          text: `Oh namanya ${result.value.toLowerCase()} kah`,
          confirmButtonText: 'Iya',
        }).then((result) => {
          Swal.fire({
            html: '<h4>Namamu cantik, pasti sama kayak orangnya</h4>',
            confirmButtonText: 'Makasih🤗'
          }).then((result) => {
            Swal.fire({
              icon: 'question',
              html: '<p>Kamu mau tau alasannya kenapa?</p>',
              confirmButtonText: 'Mau👉👈',
              showDenyButton: true,
              denyButtonText: 'Gak makasih!',
            }).then((result) => {
              if (result.isConfirmed) {
                Swal.fire({
                  icon: 'info',
                  html: '<p id="reason">Karena sudah lama diriku mencintaimu<br>Namun baru kali ini aku berani menyatakannya😊</p>',
                  confirmButtonText: 'Ohh',
                }).then((result) => {
                  Swal.fire({
                    icon: 'question',
                    html: '<p id="quest">Will you be my lover?</p>',
                    confirmButtonText: 'Yes, i will',
                    showDenyButton: true,
                    denyButtonText: 'No',
                  }).then((result) => {
                    if (result.isConfirmed) {
                      Swal.fire({
                        html: '<p id="acc">Yeyy, akhirnya setelah sekian lama ngejones ada yang nerima😭😭</p>',
                        confirmButtonText: 'Yailah lebay😌',
                      }).then((result) => {
                        Swal.fire({
                          html: '<h4>Iya iya ga lagi🤗</h4>',
                          showCancelButton: true,
                          showConfirmButton: false,
                        })
                      })
                    } else if (result.isDenied) {
                      Swal.fire({
                        html: '<h4>Huwaa emakk anakmu ditolak😭</h4>',
                        showConfirmButton: false,
                        showCancelButton: true,
                        cancelButtonText: 'Kek baru ditolak sekali aje lu',
                      })
                    }
                  })
                })
              } else if (result.isDenied) {
                Swal.fire({
                  html: '<h4>Dih sombong ye lu skrg</h4>',
                  showConfirmButton: false,
                  showCancelButton: true,
                  cancelButtonText: 'Biarin wlee😝',
                })
              }
            })
          })
        })
      }
    })
  </script>
</body>
</html>
